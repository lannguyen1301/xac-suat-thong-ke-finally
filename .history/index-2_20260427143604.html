<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hệ Thống Phân Tích Xổ Số - Bấy Bề Edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0b0f1a;
      color: #e2e8f0;
    }

    .font-mono {
      font-family: 'Roboto Mono', monospace;
    }

    /* Style bảng tối giản giống bản cũ bấy bề thích */
    .table-dark {
      background: #161e2d;
      border: 1px solid #2d3748;
    }

    .row-hover:hover {
      background: #1e293b;
    }

    .prize-cell {
      color: #94a3b8;
      font-weight: bold;
      width: 80px;
    }

    .number-cell {
      color: #38bdf8;
      font-family: 'Roboto Mono', monospace;
      font-size: 1.25rem;
      font-weight: 900;
    }
  </style>
</head>

<body class="p-4 md:p-10">
  <div class="max-w-5xl mx-auto space-y-12">

    <section id="tier-1">
      <div class="border-b border-slate-800 pb-4 mb-6">
        <h1 class="text-2xl font-black text-white tracking-tight uppercase">🎯 Dự Đoán Hệ Số Tin Cậy (Trust Score)</h1>
        <p class="text-slate-500 text-xs mt-1">Dữ liệu chốt ngày: <span id="current-date" class="text-blue-500"></span>
        </p>
      </div>

      <div id="prediction-grid" class="grid grid-cols-2 md:grid-cols-5 gap-3">
      </div>
    </section>

    <section id="tier-2" class="bg-[#111827] border border-blue-900/30 rounded-xl p-6 relative overflow-hidden">
      <div class="absolute top-0 right-0 p-2 opacity-10">
        <svg width="100" height="100" viewBox="0 0 24 24" fill="white">
          <path
            d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z" />
        </svg>
      </div>
      <h2 class="text-blue-400 font-bold mb-4 uppercase tracking-widest text-sm flex items-center">
        <span class="w-2 h-2 bg-blue-500 rounded-full mr-2"></span> Phân Tích Logic & Cơ Chế Lựa Chọn
      </h2>
      <div id="why-content" class="text-slate-400 text-sm leading-relaxed space-y-3">
      </div>
    </section>

    <section id="tier-3">
      <h2 class="text-slate-500 font-bold mb-6 uppercase tracking-widest text-xs border-l-2 border-slate-700 pl-3">Bộ
        Lọc Tần Suất Xuất Hiện (Dữ Liệu 17 Năm)</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        <div class="table-dark rounded-lg overflow-hidden">
          <div
            class="bg-slate-800/50 p-3 border-b border-slate-700 font-bold text-green-500 text-[10px] uppercase tracking-widest">
            Tần suất cao nhất (Max %)</div>
          <div id="max-freq-table" class="divide-y divide-slate-800">
          </div>
        </div>
        <div class="table-dark rounded-lg overflow-hidden">
          <div
            class="bg-slate-800/50 p-3 border-b border-slate-700 font-bold text-red-500 text-[10px] uppercase tracking-widest">
            Tần suất thấp nhất (Min %)</div>
          <div id="min-freq-table" class="divide-y divide-slate-800">
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="prediction-engine.js"></script>
  <script>
    const JSON_URL = 'data/xac-suat-thong-ke_clean.json';

    document.addEventListener('DOMContentLoaded', async () => {
      document.getElementById('current-date').innerText = new Date().toLocaleDateString('vi-VN');

      try {
        const res = await fetch(`${JSON_URL}?v=${Date.now()}`);
        const data = await res.json();

        // 1. Chạy Dự đoán Tầng 1
        if (typeof getAdvancedPrediction === 'function') {
          const predictions = getAdvancedPrediction(data);
          renderT1(predictions);
          renderT2(predictions[0]); // Lấy con Top 1 để giải thích Why
        }

        // 2. Chạy Bộ lọc Tầng 3
        const stats = calculateT3(data);
        renderT3(stats);

      } catch (e) {
        console.error("Lỗi nạp dữ liệu:", e);
      }
    });

    function renderT1(list) {
      const container = document.getElementById('prediction-grid');
      container.innerHTML = list.map((item, idx) => `
                <div class="bg-[#161e2d] border border-slate-800 p-4 rounded flex flex-col items-center">
                    <span class="text-[10px] text-slate-600 mb-1">HẠNG ${idx + 1}</span>
                    <span class="number-cell">${item.number}</span>
                    <span class="text-[9px] bg-blue-900/30 text-blue-400 px-2 mt-2 rounded border border-blue-800/50">TRUST ${item.score}</span>
                </div>
            `).join('');
    }

    function renderT2(best) {
      const container = document.getElementById('why-content');
      if (!best) return;
      container.innerHTML = `
                <p>Tại sao <span class="text-white font-bold">${best.number}</span> lại dẫn đầu? Cơ chế lựa chọn dựa trên <strong>Hệ số tin cậy (Trust Score)</strong> đạt ${best.score} điểm.</p>
                <p>Chỉ số này được so sánh trực tiếp với <strong>${best.insights.join(' và ')}</strong>. Hệ thống xác nhận con số này có độ lặp lại ổn định trong chu kỳ 100 kỳ quay gần nhất, đồng thời không vi phạm các ngưỡng "Gan" kỷ lục trong 17 năm. Đây là bộ lọc giúp người dùng tối ưu hóa niềm tin vào dữ liệu thực thay vì cảm tính.</p>
            `;
    }

    function calculateT3(data) {
      const keys = ['GDB', 'G1', 'G2', 'G3', 'G4', 'G5', 'G6', 'G7', 'G8'];
      let results = {};
      keys.forEach(k => {
        let counts = {};
        data.forEach(d => {
          const val = d.results[k];
          const arr = Array.isArray(val) ? val : [val];
          arr.forEach(n => {
            const s = n.toString().slice(-2);
            counts[s] = (counts[s] || 0) + 1;
          });
        });
        const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
        results[k] = {
          max: { num: sorted[0][0], count: sorted[0][1], p: ((sorted[0][1] / data.length) * 100).toFixed(1) },
          min: { num: sorted[sorted.length - 1][0], count: sorted[sorted.length - 1][1], p: ((sorted[sorted.length - 1][1] / data.length) * 100).toFixed(1) }
        };
      });
      return results;
    }

    function renderT3(stats) {
      const maxT = document.getElementById('max-freq-table');
      const minT = document.getElementById('min-freq-table');
      let hMax = ''; let hMin = '';

      for (let k in stats) {
        hMax += `
                    <div class="flex items-center justify-between p-3 row-hover transition">
                        <span class="prize-cell text-[10px]">${k}</span>
                        <span class="text-green-400 font-mono font-bold">${stats[k].max.num}</span>
                        <span class="text-slate-600 text-[10px]">${stats[k].max.count} lần (<span class="text-green-900">${stats[k].max.p}%</span>)</span>
                    </div>`;
        hMin += `
                    <div class="flex items-center justify-between p-3 row-hover transition">
                        <span class="prize-cell text-[10px]">${k}</span>
                        <span class="text-red-400 font-mono font-bold">${stats[k].min.num}</span>
                        <span class="text-slate-600 text-[10px]">${stats[k].min.count} lần (<span class="text-red-900">${stats[k].min.p}%</span>)</span>
                    </div>`;
      }
      maxT.innerHTML = hMax; minT.innerHTML = hMin;
    }
  </script>
</body>

</html>
