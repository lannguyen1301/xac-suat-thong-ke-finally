<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Nhập Kết Quả Xổ Số TP.HCM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #f8fafc;
        }

        .input-focus:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>

<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto bg-white rounded-3xl shadow-xl p-8">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">📝 Nhập / Sửa Kết Quả Xổ Số</h1>
            <button onclick="clearToken()"
                class="px-4 py-2 bg-red-100 text-red-600 rounded-xl hover:bg-red-200 transition">
                Xóa Token
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Ngày quay</label>
                <input id="date" type="date" class="w-full p-3 border border-gray-300 rounded-2xl input-focus">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Thứ</label>
                <select id="dayOfWeek" class="w-full p-3 border border-gray-300 rounded-2xl input-focus">
                    <option value="Thứ 2">Thứ 2</option>
                    <option value="Thứ 3">Thứ 3</option>
                    <option value="Thứ 4">Thứ 4</option>
                    <option value="Thứ 5">Thứ 5</option>
                    <option value="Thứ 6">Thứ 6</option>
                    <option value="Thứ 7">Thứ 7</option>
                    <option value="Chủ Nhật">Chủ Nhật</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Tuần / Kỳ</label>
                <input id="week" type="number" placeholder="Ví dụ: 20"
                    class="w-full p-3 border border-gray-300 rounded-2xl input-focus">
            </div>
        </div>

        <div class="space-y-8">
            <!-- Giải Đặc Biệt -->
            <div>
                <label class="block font-semibold text-red-600 mb-2">Giải Đặc Biệt (6 số)</label>
                <input id="GDB" maxlength="6"
                    class="w-full p-5 text-2xl text-center font-bold border-2 border-red-200 rounded-2xl input-focus">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block font-semibold text-blue-600 mb-2">Giải Nhất (5 số)</label>
                    <input id="G1" maxlength="5"
                        class="w-full p-4 text-xl text-center font-bold border-2 border-blue-200 rounded-2xl input-focus">
                </div>
                <div>
                    <label class="block font-semibold mb-2">Giải Nhì (5 số)</label>
                    <input id="G2" maxlength="5"
                        class="w-full p-4 text-xl text-center font-bold border rounded-2xl input-focus">
                </div>
            </div>

            <!-- Giải Ba -->
            <div>
                <label class="block font-semibold mb-2">Giải Ba (2 số)</label>
                <div class="grid grid-cols-2 gap-4">
                    <input class="G3 p-4 text-center font-bold border rounded-2xl input-focus" maxlength="5">
                    <input class="G3 p-4 text-center font-bold border rounded-2xl input-focus" maxlength="5">
                </div>
            </div>

            <!-- Giải Tư -->
            <div>
                <label class="block font-semibold mb-2">Giải Tư (7 số)</label>
                <div class="grid grid-cols-4 gap-3">
                    <input class="G4 p-3 text-center font-bold border rounded-2xl input-focus" maxlength="5">
                    <input class="G4 p-3 text-center font-bold border rounded-2xl input-focus" maxlength="5">
                    <input class="G4 p-3 text-center font-bold border rounded-2xl input-focus" maxlength="5">
                    <input class="G4 p-3 text-center font-bold border rounded-2xl input-focus" maxlength="5">
                    <input class="G4 p-3 text-center font-bold border rounded-2xl input-focus" maxlength="5">
                    <input class="G4 p-3 text-center font-bold border rounded-2xl input-focus" maxlength="5">
                    <input class="G4 p-3 text-center font-bold border rounded-2xl input-focus" maxlength="5">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="block font-semibold mb-2">Giải Năm (4 số)</label>
                    <input id="G5" maxlength="4"
                        class="w-full p-4 text-center font-bold border rounded-2xl input-focus">
                </div>
                <div class="md:col-span-2">
                    <label class="block font-semibold mb-2">Giải Sáu (3 số)</label>
                    <div class="grid grid-cols-3 gap-3">
                        <input class="G6 p-4 text-center font-bold border rounded-2xl input-focus" maxlength="4">
                        <input class="G6 p-4 text-center font-bold border rounded-2xl input-focus" maxlength="4">
                        <input class="G6 p-4 text-center font-bold border rounded-2xl input-focus" maxlength="4">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block font-semibold text-orange-600 mb-2">Giải Bảy (3 số)</label>
                    <input id="G7" maxlength="3"
                        class="w-full p-4 text-center font-bold border border-orange-200 rounded-2xl input-focus">
                </div>
                <div>
                    <label class="block font-semibold text-orange-600 mb-2">Giải Tám (2 số)</label>
                    <input id="G8" maxlength="2"
                        class="w-full p-4 text-center font-bold border border-orange-200 rounded-2xl input-focus">
                </div>
            </div>
        </div>

        <div class="mt-10 flex gap-4">
            <button onclick="saveResult()"
                class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-2xl text-xl font-bold transition">
                💾 Lưu / Cập nhật kết quả
            </button>
            <button onclick="clearForm()"
                class="px-8 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-2xl font-medium">
                Xóa form
            </button>
        </div>

        <!-- Bảng lịch sử -->
        <div class="mt-16">
            <h2 class="text-2xl font-bold mb-6">📋 15 kỳ quay gần nhất</h2>
            <div class="overflow-x-auto">
                <table class="w-full border-collapse" id="history-table">
                    <thead class="bg-gray-100">
                        <tr>
                            <th class="p-4 text-left">Ngày</th>
                            <th class="p-4 text-left">Thứ</th>
                            <th class="p-4 text-center">GĐB</th>
                            <th class="p-4 text-center">G8</th>
                            <th class="p-4 text-center">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="text-sm"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="admin-logic.js"></script>
</body>

</html>
