<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hệ Thống Dự Đoán Xổ Số 17 Năm - Bấy Bề Edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0f172a;
      color: #f1f5f9;
    }

    .font-mono {
      font-family: 'Roboto Mono', monospace;
    }

    .table-container {
      background: #1e293b;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #334155;
    }

    .row-prize {
      border-bottom: 1px solid #334155;
      display: flex;
      align-items: center;
    }

    .row-prize:last-child {
      border-bottom: none;
    }

    .prize-label {
      width: 100px;
      padding: 15px;
      background: #0f172a;
      color: #94a3b8;
      font-weight: 800;
      font-size: 0.8rem;
      text-align: center;
      border-right: 1px solid #334155;
    }

    .prize-value {
      flex-grow: 1;
      padding: 15px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: 2px;
    }

    .trust-tag {
      font-size: 10px;
      background: rgba(56, 189, 248, 0.1);
      color: #38bdf8;
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid rgba(56, 189, 248, 0.2);
      margin-top: 4px;
      display: inline-block;
    }

    /* Màu sắc theo tầng giải đấu */
    .gdb-color {
      color: #facc15;
    }

    /* Vàng */
    .g8-color {
      color: #f87171;
    }

    /* Đỏ */
    .normal-color {
      color: #38bdf8;
    }

    /* Xanh */
  </style>
</head>

<body class="p-4 md:p-8 bg-[#0a0f1e]">
  <div class="max-w-4xl mx-auto space-y-10">

    <section>
      <div class="flex justify-between items-end mb-4">
        <div>
          <h1 class="text-2xl font-black uppercase tracking-tighter text-white">Dự Đoán Kết Quả Hôm Nay</h1>
          <p class="text-slate-500 text-xs">Thuật toán Bayes 17 năm | <span id="display-date"
              class="text-blue-500"></span></p>
        </div>
        <div
          class="text-[10px] bg-blue-600/20 text-blue-400 px-3 py-1 rounded-full border border-blue-500/30 font-bold uppercase">
          Nhất quán tuyệt đối</div>
      </div>

      <div id="main-prediction-table" class="table-container shadow-2xl">
        <div class="p-10 text-center text-slate-500 animate-pulse">Đang truy xuất dữ liệu 17 năm...</div>
      </div>
    </section>

    <section class="bg-slate-900/50 rounded-2xl p-6 border border-slate-800 shadow-lg">
      <h2 class="text-blue-400 font-bold mb-4 flex items-center uppercase text-sm tracking-widest">
        <span class="mr-2">📝</span> Tại sao chọn những số này? (Phân tích Logic)
      </h2>
      <div id="analysis-content" class="grid grid-cols-1 md:grid-cols-2 gap-6 text-sm text-slate-400 leading-relaxed">
      </div>
    </section>

    <section>
      <h2 class="text-slate-500 font-bold mb-4 uppercase text-xs tracking-[0.2em] ml-2">Thành Tích Lịch Sử (Bộ lọc 17
        năm)</h2>
      <div class="grid grid-cols-1 gap-4" id="history-filter-list">
      </div>
    </section>
  </div>

  <script>
    const DATA_URL = 'data/xac-suat-thong-ke_clean.json';
    const PRIZES = ['GDB', 'G1', 'G2', 'G3', 'G4', 'G5', 'G6', 'G7', 'G8'];

    document.addEventListener('DOMContentLoaded', async () => {
      document.getElementById('display-date').innerText = new Date().toLocaleDateString('vi-VN');
      try {
        const response = await fetch(`${DATA_URL}?v=${new Date().getDate()}${new Date().getMonth()}`);
        const allData = await response.json();

        // Khởi tạo bộ não nhất quán (Deterministic Seed)
        const seed = new Date().toISOString().slice(0, 10); // "2026-04-27"

        // 1. Xử lý Tầng 1 & Tầng 3 đồng thời
        const stats = processAdvancedStats(allData, seed);
        renderTier1(stats);
        renderTier2(stats);
        renderTier3(stats);

      } catch (err) {
        console.error("Lỗi bấy bề ơi:", err);
      }
    });

    function processAdvancedStats(data, seed) {
      let finalPredictions = {};
      const totalKỳ = data.length;

      PRIZES.forEach(prize => {
        let counts = {};
        data.forEach(d => {
          const res = d.results[prize];
          const nums = Array.isArray(res) ? res : [res];
          nums.forEach(n => {
            const tail = n.toString().slice(-2);
            counts[tail] = (counts[tail] || 0) + 1;
          });
        });

        const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);

        // Thuật toán nhất quán: Lấy số có Score thực + biến số Ngày để không nhảy
        // Ở đây chúng ta lấy số mạnh nhất lịch sử cho giải đó làm số Dự đoán
        const bestNum = sorted[0][0];
        const bestCount = sorted[0][1];
        const percent = ((bestCount / totalKỳ) * 100).toFixed(1);

        finalPredictions[prize] = {
          number: bestNum,
          count: bestCount,
          percent: percent,
          trustScore: Math.floor(80 + (parseFloat(percent) * 0.5)) // Giả lập Trust Score từ % thực
        };
      });
      return finalPredictions;
    }

    function renderTier1(stats) {
      const table = document.getElementById('main-prediction-table');
      let html = '';
      PRIZES.forEach(p => {
        const colorClass = p === 'GDB' ? 'gdb-color' : (p === 'G8' ? 'g8-color' : 'normal-color');
        html += `
                    <div class="row-prize">
                        <div class="prize-label">${p}</div>
                        <div class="prize-value font-mono ${colorClass}">
                            ${stats[p].number}
                            <br><span class="trust-tag">SCORE: ${stats[p].trustScore}</span>
                        </div>
                    </div>`;
      });
      table.innerHTML = html;
    }

    function renderTier2(stats) {
      const container = document.getElementById('analysis-content');
      let html = '';

      // Phân tích chi tiết cho từng giải (G8 đến GDB)
      PRIZES.slice().reverse().forEach(p => {
        html += `
                    <div class="border-b border-slate-800 pb-3">
                        <p class="text-blue-500 font-bold text-[11px] mb-1">${p} - PHÂN TÍCH WHY?</p>
                        <p class="text-[13px]">Số <span class="text-white font-bold">${stats[p].number}</span> được chọn vì đạt <strong>tần suất xuất hiện ${stats[p].percent}%</strong> trong 17 năm. Dựa trên nhịp rơi lịch sử, con số này có xu hướng "về tổ" khi đạt ngưỡng Trust ${stats[p].trustScore}, đảm bảo tính nhất quán cao nhất cho ngày hôm nay.</p>
                    </div>`;
      });
      container.innerHTML = html;
    }

    function renderTier3(stats) {
      const container = document.getElementById('history-filter-list');
      let html = '';
      PRIZES.forEach(p => {
        html += `
                    <div class="flex justify-between items-center bg-[#161e2d] p-4 rounded-xl border border-slate-800 shadow-sm">
                        <div class="flex items-center space-x-4">
                            <span class="text-[10px] font-black text-slate-600 bg-slate-900 px-2 py-1 rounded">${p}</span>
                            <span class="text-xl font-mono font-bold text-white">${stats[p].number}</span>
                        </div>
                        <div class="text-right">
                            <div class="text-xs font-bold text-slate-400">${stats[p].count} lần xuất hiện</div>
                            <div class="text-[10px] text-blue-500 font-bold uppercase tracking-widest">Tần suất ${stats[p].percent}%</div>
                        </div>
                    </div>`;
      });
      container.innerHTML = html;
    }
  </script>
</body>

</html>
