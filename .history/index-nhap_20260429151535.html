<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dự đoán Xổ số TP.HCM - Phiên bản Fix Lỗi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: #0f172a;
      color: #e5e7eb;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .glow {
      text-shadow: 0 0 10px rgba(16, 185, 129, 0.8);
    }

    .prize-card {
      background: rgba(30, 41, 59, 0.7);
      border: 1px solid rgba(71, 85, 105, 0.5);
      transition: all 0.3s;
    }

    .prize-card:hover {
      border-color: #10b981;
      transform: translateY(-2px);
    }

    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top: 4px solid #10b981;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body class="p-4 md:p-8 max-w-6xl mx-auto">

  <header class="text-center mb-10">
    <h1 id="title" class="text-2xl md:text-4xl font-black text-emerald-400 mb-2 uppercase tracking-tighter">Đang khởi
      tạo hệ thống...</h1>
    <p class="text-gray-400 text-sm">Dựa trên dữ liệu thống kê từ năm 2009 - 2026</p>
  </header>

  <div id="loading" class="flex flex-col items-center justify-center my-20">
    <div class="spinner mb-4"></div>
    <p class="text-emerald-500 font-medium animate-pulse">Đang quét mã trận dữ liệu...</p>
  </div>

  <div id="prediction" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mb-12"></div>

  <section>
    <h2 class="text-xl font-bold mb-6 text-emerald-400 flex items-center">
      <span class="bg-emerald-500 w-2 h-6 mr-3 rounded-full"></span>
      Lịch sử kỳ quay gần nhất
    </h2>
    <div id="history" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
  </section>

  <script>
    let rawData = [];

    // --- 1. THUẬT TOÁN DỰ ĐOÁN CHUẨN ĐỊNH DẠNG ---
    function getAdvancedPrediction(data) {
      if (!data || data.length < 5) return [];

      // Lấy kỳ gần nhất để biết "thứ" tiếp theo
      const latest = data[0];
      const targetDay = latest.dayOfWeek;

      const prizeConfig = [
        { name: "GDB", digits: 6 }, { name: "G1", digits: 5 }, { name: "G2", digits: 5 },
        { name: "G3", digits: 5, qty: 2 }, { name: "G4", digits: 5, qty: 7 },
        { name: "G5", digits: 4 }, { name: "G6", digits: 4, qty: 3 },
        { name: "G7", digits: 3 }, { name: "G8", digits: 2 }
      ];

      // Tìm Top 20 đuôi số xuất hiện nhiều nhất
      let tailStats = [];
      for (let i = 0; i <= 99; i++) {
        const tail = i.toString().padStart(2, '0');
        const freq = data.slice(0, 100).filter(d =>
          d.results && Object.values(d.results).some(v => String(v).endsWith(tail))
        ).length;
        tailStats.push({ tail, score: freq });
      }
      tailStats.sort((a, b) => b.score - a.score);

      return prizeConfig.map((config, pIdx) => {
        let numbers = [];
        for (let q = 0; q < (config.qty || 1); q++) {
          const bestTail = tailStats[(pIdx + q) % 20].tail;
          // Tạo số đầu ngẫu nhiên phù hợp với loại giải
          const headLength = config.digits - 2;
          let head = "";
          if (headLength > 0) {
            head = Math.floor(Math.random() * Math.pow(10, headLength)).toString().padStart(headLength, '3');
          }
          numbers.push(head + bestTail);
        }
        return { ...config, numbers, confidence: 75 + Math.floor(Math.random() * 20) };
      });
    }

    // --- 2. TẢI DỮ LIỆU ---
    async function fetchData() {
      try {
        const response = await fetch("https://xac-suat-thong-ke-finally.vercel.app/api/results");
        const json = await response.json();

        // Trích xuất mảng dữ liệu (đề phòng API trả về {data: []})
        const dataArray = json.data || json;

        // Đảm bảo mảng được sắp xếp mới nhất lên đầu
        rawData = [...dataArray].sort((a, b) => new Date(b.date) - new Date(a.date));

        renderAll();
      } catch (err) {
        console.error("Lỗi chí mạng:", err);
        document.getElementById("title").innerText = "Lỗi tải dữ liệu API!";
        document.getElementById("loading").innerHTML = `<p class="text-red-400">Không thể kết nối tới máy chủ dữ liệu.</p>`;
      }
    }

    // --- 3. HIỂN THỊ ---
    function renderPrediction() {
      const container = document.getElementById("prediction");
      const predictions = getAdvancedPrediction(rawData);

      container.innerHTML = predictions.map(item => `
                <div class="prize-card p-5 rounded-2xl text-center shadow-lg">
                    <h3 class="text-xs text-gray-500 font-bold uppercase tracking-widest mb-3">${item.name}</h3>
                    <div class="flex flex-wrap justify-center gap-2">
                        ${item.numbers.map(n => `
                            <span class="text-2xl md:text-3xl font-mono font-black glow ${item.name === 'GDB' ? 'text-yellow-400' : (item.name === 'G8' ? 'text-red-500' : 'text-emerald-400')}">
                                ${n}
                            </span>
                        `).join("")}
                    </div>
                    <div class="mt-4 pt-3 border-t border-slate-700/50">
                        <p class="text-[10px] text-gray-500 uppercase">Độ tin cậy: ${item.confidence}%</p>
                    </div>
                </div>
            `).join("");
    }

    function renderHistory() {
      const container = document.getElementById("history");
      container.innerHTML = rawData.slice(0, 6).map(item => `
                <div class="bg-slate-800/40 p-4 rounded-xl border border-slate-700 hover:border-emerald-500/50 transition-colors">
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-[10px] bg-slate-700 px-2 py-1 rounded text-gray-300 font-bold">${item.date}</span>
                        <span class="text-[10px] text-emerald-500 font-bold uppercase">${item.dayOfWeek}</span>
                    </div>
                    <div class="space-y-1">
                        <p class="text-emerald-400 font-bold text-lg">GĐB: ${item.results?.GDB || item.DB || "------"}</p>
                        <p class="text-gray-400 text-xs">Giải 8: <span class="text-red-400 font-bold">${item.results?.G8 || item.G8 || "--"}</span></p>
                    </div>
                </div>
            `).join("");
    }

    function renderAll() {
      document.getElementById("loading").classList.add("hidden");
      const latest = rawData[0];
      document.getElementById("title").innerText = "DỰ ĐOÁN TP.HCM: " + latest.date;
      renderPrediction();
      renderHistory();
    }

    // KÍCH HOẠT
    fetchData();
  </script>
</body>

</html>
