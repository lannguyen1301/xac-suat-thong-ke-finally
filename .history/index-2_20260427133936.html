  <script>
    let rawData = [];

    async function fetchData() {
      try {
        const res = await fetch("https://xac-suat-thong-ke-finally.vercel.app/api/results");
        const data = await res.json();
        // Lấy mảng data và đảo ngược để ngày mới nhất lên đầu cho dễ xử lý lịch sử
        rawData = (data.data || data).reverse();

        renderAll();
      } catch (err) {
        console.error("Lỗi kết nối API:", err);
        document.getElementById("title").innerText = "Lỗi tải dữ liệu!";
      }
    }

    // Hàm tính ngày quay tiếp theo cực chuẩn cho đài HCM
    function getNextDrawDate(latestDateStr) {
      const date = new Date(latestDateStr);
      let count = 0;
      while (count < 7) { // Chỉ tìm trong vòng 7 ngày tới
        date.setDate(date.getDate() + 1);
        const day = date.getDay(); // 1 là Thứ 2, 6 là Thứ 7
        if (day === 1 || day === 6) break;
        count++;
      }
      return date.toLocaleDateString("vi-VN");
    }

    // Hàm dự đoán "Tạm thời" (Sẽ thay bằng logic xác suất sau)
    function generatePrediction(latestData) {
      const prizes = [
        { name: "GDB", digits: 6 }, { name: "G1", digits: 5 },
        { name: "G2", digits: 5 }, { name: "G3", digits: 5, qty: 2 },
        { name: "G4", digits: 5, qty: 7 }, { name: "G5", digits: 4 },
        { name: "G6", digits: 4, qty: 3 }, { name: "G7", digits: 3 },
        { name: "G8", digits: 2 }
      ];

      return prizes.map(p => {
        const genNum = () => Math.floor(Math.random() * Math.pow(10, p.digits)).toString().padStart(p.digits, '0');
        return {
          name: p.name,
          // Nếu giải có nhiều số (như G3, G4) thì tạo mảng số
          numbers: p.qty ? Array.from({ length: p.qty }, genNum) : [genNum()],
          confidence: (Math.random() * 20 + 75).toFixed(1), // Giả lập độ tin cậy > 75%
          frequency: Math.floor(Math.random() * 50 + 10)
        };
      });
    }

    function renderPrediction() {
      const container = document.getElementById("prediction");
      container.innerHTML = "";

      // Lấy dữ liệu kỳ gần nhất để làm cơ sở (tạm thời)
      const predictions = generatePrediction(rawData[0]);

      predictions.forEach(item => {
        // Hiển thị danh sách số nếu có nhiều số trong 1 giải
        const numbersHtml = item.numbers.map(n => `<div class="text-xl md:text-2xl font-bold text-emerald-400 glow p-1">${n}</div>`).join("");

        container.innerHTML += `
            <div class="bg-slate-800 p-4 rounded-xl text-center border border-slate-700">
                <h3 class="text-sm text-gray-400 font-semibold">${item.name}</h3>
                <div class="flex flex-wrap justify-center gap-2 mt-2">
                    ${numbersHtml}
                </div>
                <p class="text-[10px] text-gray-500 mt-2 italic">
                    Độ tin cậy: ${item.confidence}% | Tần suất: ${item.frequency}
                </p>
            </div>
        `;
      });
    }

    function renderHistory(limit = 5) {
      const container = document.getElementById("history");
      container.innerHTML = "";

      rawData.slice(0, limit).forEach(item => {
        container.innerHTML += `
            <div class="bg-slate-800 p-4 rounded-xl border-l-4 border-emerald-500">
                <div class="flex justify-between items-center mb-2">
                    <p class="text-xs text-gray-400">${item.date} (${item.dayOfWeek})</p>
                    <span class="text-[10px] bg-slate-700 px-2 py-1 rounded">Kỳ: ${item.period}</span>
                </div>
                <p class="text-emerald-400 font-bold text-lg">
                    GĐB: ${item.results?.GDB || "----"}
                </p>
                <p class="text-gray-400 text-xs mt-1">Giải 8: ${item.results?.G8 || "--"}</p>
            </div>
        `;
      });
    }

    function renderAll() {
      document.getElementById("loading").style.display = "none";

      // Vì đã reverse() nên phần tử 0 là mới nhất
      const latest = rawData[0];
      const nextDate = getNextDrawDate(latest.date);

      document.getElementById("title").innerHTML = `
        <span class="block text-sm font-normal text-gray-400 uppercase tracking-widest mb-2">Dự đoán kỳ quay tiếp theo</span>
        TP.HCM: ${nextDate}
    `;

      renderPrediction();
      renderHistory(5);
    }

    // Lắng nghe sự kiện đổi limit
    document.getElementById("limit").addEventListener("change", (e) => {
      renderHistory(parseInt(e.target.value));
    });

    fetchData();
  </script>
</body>

</html>
