  <div id="history" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

  <script>
    // --- 1. THUẬT TOÁN: TẠO SỐ ĐÚNG ĐỊNH DẠNG ---
    function getAdvancedPrediction(data) {
      if (!data || data.length < 20) return [];
      const validData = data.filter(d => d.results);
      const targetDay = validData[0].dayOfWeek;

      const prizeConfig = [
        { name: "GDB", digits: 6 }, { name: "G1", digits: 5 }, { name: "G2", digits: 5 },
        { name: "G3", digits: 5, qty: 2 }, { name: "G4", digits: 5, qty: 7 },
        { name: "G5", digits: 4 }, { name: "G6", digits: 4, qty: 3 },
        { name: "G7", digits: 3 }, { name: "G8", digits: 2 }
      ];

      // Tính toán Top 20 đuôi (2 số cuối) dựa trên dữ liệu 17 năm
      let tailScores = [];
      for (let i = 0; i <= 99; i++) {
        const tail = i.toString().padStart(2, "0");
        const freq = validData.slice(0, 200).filter(d =>
          Object.values(d.results).some(v => String(v).endsWith(tail))
        ).length;
        const dayFreq = validData.slice(0, 500).filter(d =>
          d.dayOfWeek === targetDay && Object.values(d.results).some(v => String(v).endsWith(tail))
        ).length;
        tailScores.push({ tail, score: freq * 12 + dayFreq * 18, freq });
      }
      tailScores.sort((a, b) => b.score - a.score);

      // Ghép đầu cho đuôi để đủ số chữ số của từng giải
      return prizeConfig.map((config, pIdx) => {
        let numbers = [];
        for (let q = 0; q < (config.qty || 1); q++) {
          const bestTail = tailScores[(pIdx + q) % 20].tail;
          // Tìm một số thực tế trong lịch sử có đuôi này để lấy "đầu" cho thật
          const match = validData.find(d => Object.values(d.results).some(v => String(v).endsWith(bestTail)));
          let fullNum = "";
          if (match && config.digits > 2) {
            const sample = String(Object.values(match.results).find(v => String(v).endsWith(bestTail)));
            fullNum = sample.padStart(config.digits, "0").slice(-config.digits);
          } else {
            fullNum = Math.floor(Math.random() * Math.pow(10, config.digits - 2)).toString().padStart(config.digits - 2, "3") + bestTail;
          }
          numbers.push(fullNum);
        }
        return { ...config, numbers, score: tailScores[pIdx % 20].score };
      });
    }

    // --- 2. RENDER: IN ĐÚNG SỐ RA MÀN HÌNH ---
    function renderPrediction() {
      const container = document.getElementById("prediction");
      if (!container) return;

      // Xóa sạch dữ liệu cũ trước khi vẽ
      container.innerHTML = "";

      const finalData = getAdvancedPrediction(rawData);

      finalData.forEach(item => {
        // PHẦN QUAN TRỌNG: Lặp qua mảng item.numbers để in đủ chữ số
        const numbersHtml = item.numbers.map(n => `
            <div class="text-xl md:text-2xl font-black font-mono tracking-tighter p-1 
                ${item.name === 'GDB' ? 'text-yellow-400' : (item.name === 'G8' ? 'text-red-500' : 'text-emerald-400')}">
                ${n}
            </div>
        `).join("");

        container.innerHTML += `
            <div class="bg-slate-800/50 p-4 rounded-xl text-center border border-slate-700 shadow-xl">
                <h3 class="text-[10px] text-gray-500 font-bold uppercase mb-2 tracking-widest">${item.name}</h3>
                <div class="flex flex-wrap justify-center gap-2">
                    ${numbersHtml}
                </div>
                <p class="text-[9px] text-gray-600 mt-2">Tin cậy: ${item.score}%</p>
            </div>
        `;
      });
    }
  </script>
</body>
