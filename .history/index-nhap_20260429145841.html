    body {

    }

    .glow {
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.7);
    }

    .spinner {

<body class="p-4 md:p-8">

    Đang tải dữ liệu...

  <div id="loading" class="flex flex-col items-center justify-center mb-6">
    <div class="spinner mb-2"></div>
    <p class="text-sm text-gray-400">Tính toán xác suất từ 1779 kỳ quay...</p>
  </div>

  <!-- CONTROL PANEL -->
  <div class="bg-slate-800 p-4 rounded-xl mb-6 grid grid-cols-1 md:grid-cols-3 gap-4">
    <input type="date" id="dateInput" class="p-2 rounded bg-slate-700 text-white" />
    <select id="weekday" class="p-2 rounded bg-slate-700 text-white">

      <option value="1">Thứ 2</option>
      <option value="6">Thứ 7</option>

    <select id="limit" class="p-2 rounded bg-slate-700 text-white">
      <option value="5">5 kỳ</option>
      <option value="10">10 kỳ</option>
      <option value="20">20 kỳ</option>
      <option value="40">40 kỳ</option>
      <option value="80">80 kỳ</option>
      <option value="160">160 kỳ</option>
    </select>
  </div>

  <!-- PREDICTION TABLE -->
  <div id="prediction" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8"></div>

  <!-- HISTORY -->
  <h2 class="text-lg md:text-xl font-semibold mb-4 text-emerald-400">
    Lịch sử gần nhất
  </h2>

  <div id="history" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4"></div>

  <script src="prediction-engine.js"></script>

  <script>
    let rawData = [];

    // HÀM TẢI DỮ LIỆU
    async function fetchData() {
      try {
        // Gọi file JSON đã làm sạch
        const res = await fetch("data/xac-suat-thong-ke_clear.json");
        const data = await res.json();

        // Đảo ngược để ngày mới nhất lên đầu (rawData[0])
        rawData = (data.data || data).reverse();

        renderAll();
      } catch (err) {
        console.error("Lỗi tải dữ liệu:", err);
        document.getElementById("title").innerText = "Lỗi kết nối dữ liệu!";
      }
    }

    // HÀM TỔNG HỢP ĐỂ CHẠY CẢ TRANG
    function renderAll() {
      document.getElementById("loading").style.display = "none";

      const latest = rawData[0];
      // Tự động tính ngày mai (hoặc kỳ tiếp theo)
      const date = new Date(latest.date);
      date.setDate(date.getDate() + 1);

      document.getElementById("title").innerHTML = `
        <span class="block text-sm font-normal text-gray-400 uppercase mb-2">Hệ thống dự đoán thông minh</span>
        TP.HCM: ${date.toLocaleDateString("vi-VN")}
      `;

      // KÍCH HOẠT VẼ GIAO DIỆN DỰ ĐOÁN
      renderPrediction();
      // KÍCH HOẠT VẼ LỊCH SỬ
      renderHistory(5);
    }

    // HÀM VẼ LỊCH SỬ (ĐỂ BẤY BỀ SOI LẠI KẾT QUẢ CŨ)
    function renderHistory(limit = 5) {
      const container = document.getElementById("history");
      container.innerHTML = "";
      rawData.slice(0, limit).forEach(item => {
        container.innerHTML += `
          <div class="bg-slate-800 p-4 rounded-xl border-l-4 border-emerald-500">
            <p class="text-xs text-gray-400">${item.date} (${item.dayOfWeek})</p>
            <p class="text-emerald-400 font-bold text-lg mt-1">GĐB: ${item.results?.GDB || "----"}</p>
            <p class="text-gray-500 text-xs">Giải 8: ${item.results?.G8 || "--"}</p>
          </div>
        `;
      });
    }

    // KHỞI CHẠY TOÀN BỘ HỆ THỐNG
    fetchData();
  </script>
</body>

</html>
