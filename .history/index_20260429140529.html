<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dự Đoán Xổ Số TP.HCM - Thống Kê Thông Minh</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="prediction-engine.js"></script>

  <style>
    body {
      background: #0f172a;
      color: #e5e7eb;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .glow {
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.5);
    }

    .number-box {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: 4px;
    }
  </style>
</head>

<body class="min-h-screen p-4 md:p-8">

  <div class="max-w-6xl mx-auto">
    <!-- Header -->
    <h1 class="text-3xl md:text-5xl font-bold text-center text-emerald-400 mb-2">
      Dự Đoán Xổ Số TP.HCM
    </h1>
    <p class="text-center text-gray-400 mb-8">Dựa trên phân tích thống kê từ hơn 1700 kỳ quay</p>

    <!-- Loading -->
    <div id="loading" class="flex flex-col items-center justify-center my-16">
      <div class="w-12 h-12 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
      <p class="text-gray-400">Đang phân tích dữ liệu...</p>
    </div>

    <!-- Title -->
    <div id="title" class="text-center mb-10 hidden">
      <p class="text-emerald-400 text-sm tracking-widest">KỲ QUAY TIẾP THEO</p>
      <h2 id="nextDate" class="text-4xl font-bold text-white"></h2>
    </div>

    <!-- Dự Đoán Chính -->
    <div class="mb-12">
      <h2 class="text-xl font-semibold mb-6 text-emerald-400 flex items-center gap-2">
        🎯 Top 12 số dự đoán cho Giải 8
      </h2>
      <div id="prediction" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
    </div>

    <!-- Lịch sử gần đây -->
    <div>
      <h2 class="text-xl font-semibold mb-6 text-emerald-400">📋 Lịch sử 10 kỳ gần nhất</h2>
      <div id="history" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </div>
  </div>

  <script>
    let rawData = [];

    async function fetchData() {
      try {
        const res = await fetch("/api/results");
        const result = await res.json();

        rawData = Array.isArray(result.data) ? result.data : result;
        rawData = rawData.sort((a, b) => new Date(b.date) - new Date(a.date)); // Mới nhất lên đầu

        document.getElementById("loading").classList.add("hidden");
        document.getElementById("title").classList.remove("hidden");

        renderAll();
      } catch (err) {
        console.error("Lỗi tải dữ liệu:", err);
        document.getElementById("loading").innerHTML = `
                    <p class="text-red-400 text-xl">Không thể kết nối API</p>
                    <p class="text-gray-500 mt-2">Vui lòng deploy Vercel trước</p>
                `;
      }
    }

    function getNextDrawDate(latestDate) {
      let date = new Date(latestDate);
      date.setDate(date.getDate() + 1);
      while (true) {
        const day = date.getDay();
        if (day === 1 || day === 6) break; // Thứ 2 hoặc Thứ 7
        date.setDate(date.getDate() + 1);
      }
      return date.toLocaleDateString('vi-VN', { weekday: 'long', year: 'numeric', month: '2-digit', day: '2-digit' });
    }

    function renderPrediction() {
      const container = document.getElementById("prediction");
      container.innerHTML = "";

      if (!rawData || rawData.length === 0) return;

      const topPredictions = getAdvancedPrediction(rawData);

      topPredictions.forEach((item, index) => {
        const insightText = item.insights && item.insights.length > 0
          ? `<p class="text-amber-400 text-xs mt-2">${item.insights.join(" • ")}</p>`
          : '';

        container.innerHTML += `
                    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 glow text-center">
                        <div class="text-emerald-400 text-sm font-medium mb-2">#${index + 1}</div>
                        <div class="number-box text-white mb-3">${item.number}</div>
                        <div class="text-emerald-400 font-bold text-lg">${item.score} điểm</div>
                        ${insightText}
                    </div>
                `;
      });
    }

    function renderHistory() {
      const container = document.getElementById("history");
      container.innerHTML = "";

      rawData.slice(0, 10).forEach(item => {
        container.innerHTML += `
                    <div class="bg-slate-800 p-5 rounded-2xl border-l-4 border-emerald-500">
                        <div class="flex justify-between text-xs text-gray-400 mb-3">
                            <span>${item.date}</span>
                            <span>${item.dayOfWeek}</span>
                        </div>
                        <div class="text-2xl font-bold text-emerald-400 mb-1">
                            ${item.results?.GDB || '------'}
                        </div>
                        <div class="text-gray-400 text-sm">Giải 8: ${item.results?.G8 || '--'}</div>
                    </div>
                `;
      });
    }

    function renderAll() {
      const latest = rawData[0];
      const nextDateStr = getNextDrawDate(latest.date);

      document.getElementById("nextDate").textContent = nextDateStr;

      renderPrediction();
      renderHistory();
    }

    // Khởi chạy
    fetchData();
  </script>
</body>

</html>
