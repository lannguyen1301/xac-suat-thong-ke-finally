<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Quản lý Kết quả Xổ số</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-4 md:p-10">

    <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-2xl p-6 md:p-8">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-extrabold text-blue-800">Nhập Kết Quả Xổ Số</h1>
            <button onclick="clearToken()"
                class="text-xs bg-red-100 text-red-600 px-3 py-1 rounded-lg hover:bg-red-200 transition">
                Xóa Token đã lưu
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 bg-blue-50 p-6 rounded-xl">
            <div class="flex flex-col">
                <label class="font-semibold mb-1">Ngày quay</label>
                <input id="date" type="date"
                    class="p-3 border rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" />
            </div>
            <div class="flex flex-col">
                <label class="font-semibold mb-1">Thứ</label>
                <select id="day" class="p-3 border rounded-xl focus:ring-2 focus:ring-blue-400 outline-none">
                    <option>Chủ Nhật</option>
                    <option>Thứ 2</option>
                    <option>Thứ 3</option>
                    <option>Thứ 4</option>
                    <option>Thứ 5</option>
                    <option>Thứ 6</option>
                    <option>Thứ 7</option>
                </select>
            </div>
            <div class="flex flex-col">
                <label class="font-semibold mb-1">Kỳ quay (Tuần)</label>
                <input id="round" type="number" placeholder="Ví dụ: 15"
                    class="p-3 border rounded-xl focus:ring-2 focus:ring-blue-400 outline-none" />
            </div>
        </div>

        <div class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="font-bold text-red-600">Giải Đặc Biệt (6 số)</label>
                    <input id="gdb" maxlength="6"
                        class="w-full p-4 border-2 border-red-200 rounded-xl text-center text-xl font-bold tracking-widest focus:border-red-500 outline-none" />
                </div>
                <div>
                    <label class="font-bold text-blue-600">Giải Nhất (5 số)</label>
                    <input id="g1" maxlength="5"
                        class="w-full p-4 border-2 border-blue-200 rounded-xl text-center text-xl font-bold tracking-widest focus:border-blue-500 outline-none" />
                </div>
            </div>

            <div>
                <label class="font-bold">Giải Nhì (5 số)</label>
                <input id="g2" maxlength="5" class="w-full p-3 border rounded-xl text-center font-bold" />
            </div>

            <div>
                <label class="font-bold">Giải Ba (2 số)</label>
                <div class="grid grid-cols-2 gap-3">
                    <input class="g3 p-3 border rounded-xl text-center font-bold" maxlength="5" />
                    <input class="g3 p-3 border rounded-xl text-center font-bold" maxlength="5" />
                </div>
            </div>

            <div>
                <label class="font-bold">Giải Tư (7 số)</label>
                <div class="grid grid-cols-4 gap-3">
                    <input class="g4 p-3 border rounded-xl text-center font-bold" maxlength="5" />
                    <input class="g4 p-3 border rounded-xl text-center font-bold" maxlength="5" />
                    <input class="g4 p-3 border rounded-xl text-center font-bold" maxlength="5" />
                    <input class="g4 p-3 border rounded-xl text-center font-bold" maxlength="5" />
                    <input class="g4 p-3 border rounded-xl text-center font-bold" maxlength="5" />
                    <input class="g4 p-3 border rounded-xl text-center font-bold" maxlength="5" />
                    <input class="g4 p-3 border rounded-xl text-center font-bold" maxlength="5" />
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="font-bold">Giải Năm</label>
                    <input id="g5" maxlength="4" class="w-full p-3 border rounded-xl text-center font-bold" />
                </div>
                <div class="col-span-2">
                    <label class="font-bold">Giải Sáu (3 số)</label>
                    <div class="grid grid-cols-3 gap-3">
                        <input class="g6 p-3 border rounded-xl text-center font-bold" maxlength="4" />
                        <input class="g6 p-3 border rounded-xl text-center font-bold" maxlength="4" />
                        <input class="g6 p-3 border rounded-xl text-center font-bold" maxlength="4" />
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="font-bold text-orange-600">Giải Bảy</label>
                    <input id="g7" maxlength="3"
                        class="w-full p-3 border border-orange-200 rounded-xl text-center font-bold" />
                </div>
                <div>
                    <label class="font-bold text-orange-600">Giải Tám</label>
                    <input id="g8" maxlength="2"
                        class="w-full p-3 border border-orange-200 rounded-xl text-center font-bold" />
                </div>
            </div>
        </div>

        <button onclick="submitData()"
            class="mt-10 w-full bg-blue-700 text-white py-4 rounded-2xl text-xl font-bold hover:bg-blue-800 shadow-lg transition-all transform hover:-translate-y-1">
            🚀 Cập nhật kết quả lên hệ thống
        </button>
    </div>

    <div class="mt-10 bg-white rounded-2xl shadow-xl p-6 overflow-x-auto">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center">
            📋 Danh sách 20 kỳ quay gần nhất
        </h2>
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-gray-100">
                    <th class="p-3 border">Ngày</th>
                    <th class="p-3 border">Thứ</th>
                    <th class="p-3 border">Giải Đặc Biệt</th>
                    <th class="p-3 border text-center">Thao tác</th>
                </tr>
            </thead>
            <tbody id="data-table-body">
                <tr>
                    <td colspan="4" class="p-4 text-center">Đang tải dữ liệu...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <div id="prediction-container">
        <p>Đang phân tích dữ liệu 17 năm...</p>
    </div>

    <script src="prediction-engine.js"></script>
    <script src="admin-logic.js"></script>

    <script>
        // --- CẤU HÌNH ---
        const OWNER = "lannguyen1301";
        const REPO = "xac-suat-thong-ke-finally";
        const PATH = "data/xac-suat-thong-ke_clean.json";
        const BRANCH = "main";

        // Hàm xóa token đã lưu
        function clearToken() {
            localStorage.removeItem("github_token");
            alert("Đã xóa token khỏi máy này!");
        }

        // Lấy mảng dữ liệu từ các input nhóm
        function getValues(className) {
            return Array.from(document.querySelectorAll(`.${className}`))
                .map(i => i.value.trim())
                .filter(v => v !== "");
        }

        // Bước 1: Thu thập dữ liệu
        function submitData() {
            const data = {
                date: document.getElementById("date").value,
                day: document.getElementById("day").value,
                round: document.getElementById("round").value,
                results: {
                    gdb: document.getElementById("gdb").value,
                    g1: document.getElementById("g1").value,
                    g2: document.getElementById("g2").value,
                    g3: getValues("g3"),
                    g4: getValues("g4"),
                    g5: document.getElementById("g5").value,
                    g6: getValues("g6"),
                    g7: document.getElementById("g7").value,
                    g8: document.getElementById("g8").value
                }
            };

            if (!data.date) return alert("Bấy bề chọn ngày đã chứ!");
            updateGitHub(data);
        }

        // Bước 2: Đẩy lên GitHub
        // Bước 2: Đẩy lên GitHub (Bản nâng cấp thông minh)
        async function updateGitHub(newData) {
            let token = localStorage.getItem("github_token");
            if (!token) {
                token = prompt("Dán Token vào đây bấy bề:");
                if (token) localStorage.setItem("github_token", token); else return;
            }

            try {
                const metaUrl = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}?ref=${BRANCH}`;
                const metaRes = await fetch(metaUrl, { headers: { "Authorization": `token ${token}` } });
                const metaData = await metaRes.json();
                const sha = metaData.sha;

                const rawRes = await fetch(`https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${PATH}?t=${new Date().getTime()}`);
                let content = await rawRes.json();

                // Format dữ liệu từ form
                const formattedData = {
                    date: newData.date,
                    dayOfWeek: newData.day,
                    week: parseInt(newData.round) || 0,
                    results: {
                        GDB: newData.results.gdb, G1: newData.results.g1, G2: newData.results.g2,
                        G3: newData.results.g3, G4: newData.results.g4, G5: newData.results.g5,
                        G6: newData.results.g6, G7: newData.results.g7, G8: newData.results.g8
                    },
                    allNumbers: [
                        newData.results.gdb, newData.results.g1, newData.results.g2,
                        ...newData.results.g3, ...newData.results.g4,
                        newData.results.g5, ...newData.results.g6,
                        newData.results.g7, newData.results.g8
                    ]
                };

                // --- LOGIC THÔNG MINH: KIỂM TRA TRÙNG NGÀY ĐỂ SỬA ---
                const existingIndex = content.findIndex(item => item.date === newData.date);
                if (existingIndex > -1) {
                    content[existingIndex] = formattedData; // Ghi đè (Sửa)
                } else {
                    content.push(formattedData); // Thêm mới
                }

                await pushToGitHub(content, sha, token, `Admin: Cập nhật ngày ${newData.date}`);
            } catch (err) { alert("Lỗi: " + err.message); }
        }

        // Hàm phụ để dùng chung cho cả Xóa và Sửa
        async function updateGitHubManual(fullData, message) {
            let token = localStorage.getItem("github_token");
            const metaUrl = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}?ref=${BRANCH}`;
            const metaRes = await fetch(metaUrl, { headers: { "Authorization": `token ${token}` } });
            const metaData = await metaRes.json();
            await pushToGitHub(fullData, metaData.sha, token, message);
        }

        async function pushToGitHub(data, sha, token, message) {
            const jsonString = JSON.stringify(data, null, 2);
            const updatedContentBase64 = btoa(unescape(encodeURIComponent(jsonString)));
            const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`, {
                method: "PUT",
                headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                body: JSON.stringify({ message: message, content: updatedContentBase64, sha: sha })
            });

            if (response.ok) {
                alert("✅ Thành công!");
                if (typeof loadData === "function") loadData(); // Tải lại bảng mà không reload trang
            }
        }
    </script>
</body>

</html>
